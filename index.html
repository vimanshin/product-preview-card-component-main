<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <title>Frontend Mentor | Product preview card component</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
  </head>
  <body>
    <main class="page">
      <article class="card">
        <div class="card__media">
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="./assets/images/image-product-desktop.jpg"
            />
            <img
              class="card__image"
              src="./assets/images/image-product-mobile.jpg"
              alt="Bottle of Gabrielle Essence Eau De Parfum"
              width="350"
              height="343"
            />
          </picture>
        </div>
        <div class="card__content">
          <p class="card__category">Perfume</p>
          <h1 class="card__title">Gabrielle Essence Eau De Parfum</h1>
          <p class="card__description">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
          <div class="card__price">
            <p class="card__price-current">$149.99</p>
            <p class="card__price-old">$169.99</p>
          </div>
          <button class="card__button" type="button">
            <img
              src="./assets/images/icon-cart.svg"
              alt=""
              width="15"
              height="16"
              aria-hidden="true"
            />
            <span class="card__button-text">Add to Cart</span>
          </button>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">42</a>.
    </footer>
  </body>
</html>
